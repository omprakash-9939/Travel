<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27517A"/>
      <stop offset="1" stop-color="#0E2236"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE98A"/>
      <stop offset="0.5" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#E0A800"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="16" rx="8" fill="url(#gloss)"/>

  <!-- dotted flight trail -->
  <path d="M5 26 Q12 23 17 17" fill="none" stroke="url(#gold)" stroke-width="1.6"
